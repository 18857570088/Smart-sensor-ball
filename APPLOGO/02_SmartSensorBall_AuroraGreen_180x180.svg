<?xml version="1.0" encoding="UTF-8"?>
<!--
  Smart Sensor Ball — App Icon  Aurora Green Edition
  Size: 180 × 180 px  (iPhone @3x Home Screen)
  Same 1024-coordinate viewBox, scaled via width/height attributes.
-->
<svg
  width="180"
  height="180"
  viewBox="0 0 1024 1024"
  xmlns="http://www.w3.org/2000/svg"
  role="img">

  <title>Smart Sensor Ball 180px — Aurora Green</title>
  <desc>iPhone @3x 主屏图标 180×180px，极光绿版。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#040C08"/>
      <stop offset="55%"  stop-color="#061410"/>
      <stop offset="100%" stop-color="#081810"/>
    </linearGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="60%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="18%"  stop-color="#DFFFF0"/>
      <stop offset="55%"  stop-color="#40E090"/>
      <stop offset="100%" stop-color="#008840"/>
    </radialGradient>
    <radialGradient id="ball_shine" cx="32%" cy="28%" r="42%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ball_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00CC66" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#00CC66" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="head"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0A160C"/>
      <stop offset="100%" stop-color="#050A06"/>
    </linearGradient>
    <linearGradient id="band"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A3A24"/>
      <stop offset="100%" stop-color="#0A1810"/>
    </linearGradient>
    <linearGradient id="cord"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#80FFB0"/>
      <stop offset="100%" stop-color="#00AA55"/>
    </linearGradient>
    <linearGradient id="trk_x" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00FF88" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00FF88"/>
      <stop offset="75%"  stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="trk_y" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#AAFF00" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#AAFF00"/>
      <stop offset="75%"  stop-color="#AAFF00"/>
      <stop offset="100%" stop-color="#AAFF00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="trk_z" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00FFCC" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00FFCC"/>
      <stop offset="75%"  stop-color="#00FFCC"/>
      <stop offset="100%" stop-color="#00FFCC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ecg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00FF88"/>
      <stop offset="45%"  stop-color="#AAFF44"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <radialGradient id="amb" cx="50%" cy="40%" r="58%">
      <stop offset="0%"   stop-color="#008830" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#008830" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip"><rect width="1024" height="1024" rx="221"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <ellipse cx="512" cy="410" rx="462" ry="427" fill="url(#amb)"/>

    <!-- 赛博网格 -->
    <line x1="171" y1="42"  x2="171" y2="785" stroke="#00FF44" stroke-width="2.1" opacity="0.07"/>
    <line x1="342" y1="42"  x2="342" y2="785" stroke="#00FF44" stroke-width="2.1" opacity="0.07"/>
    <line x1="512" y1="42"  x2="512" y2="785" stroke="#00FF44" stroke-width="2.1" opacity="0.07"/>
    <line x1="683" y1="42"  x2="683" y2="785" stroke="#00FF44" stroke-width="2.1" opacity="0.07"/>
    <line x1="853" y1="42"  x2="853" y2="785" stroke="#00FF44" stroke-width="2.1" opacity="0.07"/>
    <line x1="42"  y1="171" x2="981" y2="171" stroke="#00FF44" stroke-width="2.1" opacity="0.07"/>
    <line x1="42"  y1="342" x2="981" y2="342" stroke="#00FF44" stroke-width="2.1" opacity="0.07"/>
    <line x1="42"  y1="512" x2="981" y2="512" stroke="#00FF44" stroke-width="2.1" opacity="0.07"/>
    <line x1="42"  y1="683" x2="981" y2="683" stroke="#00FF44" stroke-width="2.1" opacity="0.07"/>

    <!-- 雷达圆 -->
    <circle cx="512" cy="470" r="375" fill="none" stroke="#00FF66" stroke-width="4.3" opacity="0.22" stroke-dasharray="25.6,38.4"/>
    <circle cx="512" cy="470" r="256" fill="none" stroke="#00FF66" stroke-width="3.0" opacity="0.14" stroke-dasharray="21.3,42.7"/>

    <!-- IMU三轴 -->
    <path d="M68,239  Q154,170 239,239 Q325,308 410,239 Q496,170 582,239 Q668,308 754,239 Q840,170 926,239 Q955,170 982,239"
          fill="none" stroke="url(#trk_x)" stroke-width="6.0" stroke-linecap="round" opacity="0.58"/>
    <path d="M68,358  Q239,290 410,358 Q582,427 754,358 Q886,307 982,358"
          fill="none" stroke="url(#trk_y)" stroke-width="5.1" stroke-linecap="round" opacity="0.44"/>
    <path d="M68,477  Q154,512 239,477 Q325,443 410,477 Q496,512 582,477 Q668,443 754,477 Q840,512 926,477 Q955,512 982,477"
          fill="none" stroke="url(#trk_z)" stroke-width="4.3" stroke-linecap="round" opacity="0.32"/>
    <circle cx="68"  cy="239" r="11.9" fill="#00FF88" opacity="0.78"/>
    <circle cx="982" cy="239" r="11.9" fill="#00FF88" opacity="0.78"/>
    <circle cx="68"  cy="358" r="9.4"  fill="#AAFF00" opacity="0.62"/>
    <circle cx="982" cy="358" r="9.4"  fill="#AAFF00" opacity="0.62"/>
    <circle cx="68"  cy="477" r="7.7"  fill="#00FFCC" opacity="0.48"/>
    <circle cx="982" cy="477" r="7.7"  fill="#00FFCC" opacity="0.48"/>
    <text x="42" y="228" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="29" font-weight="700" fill="#00FF88" opacity="0.72">X</text>
    <text x="42" y="346" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="29" font-weight="700" fill="#AAFF00" opacity="0.58">Y</text>
    <text x="42" y="465" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="29" font-weight="700" fill="#00FFCC" opacity="0.44">Z</text>

    <!-- 头部 -->
    <rect x="461" y="665" width="120" height="110" rx="26" fill="url(#head)"/>
    <ellipse cx="512" cy="563" rx="154" ry="171" fill="url(#head)"/>
    <ellipse cx="512" cy="682" rx="85"  ry="34"  fill="#0C1A0E" opacity="0.55"/>

    <!-- 头带 -->
    <path d="M376,530 Q359,445 376,376 Q393,325 444,291"
          fill="none" stroke="url(#band)" stroke-width="30" stroke-linecap="round"/>
    <path d="M650,530 Q668,445 650,376 Q633,325 581,291"
          fill="none" stroke="url(#band)" stroke-width="30" stroke-linecap="round"/>
    <path d="M444,291 Q512,256 581,291"
          fill="none" stroke="url(#band)" stroke-width="26" stroke-linecap="round"/>

    <!-- 额头接点 -->
    <circle cx="512" cy="427" r="26" fill="#0E1E10"/>
    <circle cx="512" cy="427" r="17" fill="#00FF88" opacity="0.88"/>
    <circle cx="512" cy="427" r="29" fill="none" stroke="#00FF88" stroke-width="5.1" opacity="0.52"/>
    <line x1="504" y1="427" x2="520" y2="427" stroke="#001A08" stroke-width="2.6" opacity="0.6"/>
    <line x1="512" y1="419" x2="512" y2="435" stroke="#001A08" stroke-width="2.6" opacity="0.6"/>

    <!-- IMU芯片 -->
    <rect x="469" y="239" width="85" height="85" rx="15.4"
          fill="#040C06" stroke="#00FF88" stroke-width="6.4" opacity="0.96"/>
    <rect x="484" y="254" width="55" height="55" rx="7.7" fill="#00FF88" opacity="0.18"/>
    <circle cx="512" cy="281" r="17" fill="#00FF88" opacity="0.96"/>
    <circle cx="512" cy="281" r="9"  fill="#FFFFFF"  opacity="0.55"/>
    <line x1="469" y1="281" x2="452" y2="281" stroke="#00FF88" stroke-width="4.7" stroke-linecap="round" opacity="0.78"/>
    <line x1="554" y1="281" x2="571" y2="281" stroke="#00FF88" stroke-width="4.7" stroke-linecap="round" opacity="0.78"/>
    <line x1="512" y1="239" x2="512" y2="222" stroke="#00FF88" stroke-width="4.7" stroke-linecap="round" opacity="0.78"/>
    <line x1="512" y1="324" x2="512" y2="341" stroke="#00FF88" stroke-width="4.7" stroke-linecap="round" opacity="0.78"/>
    <rect x="435" y="272" width="17" height="18" rx="3.4" fill="#00FF88" opacity="0.68"/>
    <rect x="571" y="272" width="17" height="18" rx="3.4" fill="#00FF88" opacity="0.68"/>
    <rect x="503" y="205" width="18" height="17" rx="3.4" fill="#00FF88" opacity="0.68"/>
    <rect x="503" y="341" width="18" height="17" rx="3.4" fill="#00FF88" opacity="0.68"/>
    <rect x="471" y="241" width="12" height="12" rx="2.1" fill="#00FF88" opacity="0.38"/>
    <rect x="540" y="241" width="12" height="12" rx="2.1" fill="#00FF88" opacity="0.38"/>
    <rect x="471" y="310" width="12" height="12" rx="2.1" fill="#00FF88" opacity="0.38"/>
    <rect x="540" y="310" width="12" height="12" rx="2.1" fill="#00FF88" opacity="0.38"/>

    <!-- 弹力绳 -->
    <line x1="512" y1="358" x2="512" y2="427" stroke="url(#cord)" stroke-width="11.1" stroke-linecap="round"/>
    <path d="M512,427 Q478,495 512,546" fill="none" stroke="url(#cord)" stroke-width="11.1" stroke-linecap="round"/>

    <!-- 反应球 -->
    <ellipse cx="512" cy="597" rx="128" ry="128" fill="url(#ball_glow)"/>
    <circle  cx="512" cy="597" r="102" fill="url(#ball)"/>
    <circle  cx="512" cy="597" r="102" fill="url(#ball_shine)"/>
    <ellipse cx="462" cy="545" rx="43" ry="29" fill="white" opacity="0.52" transform="rotate(-22,462,545)"/>
    <circle  cx="477" cy="539" r="17" fill="white" opacity="0.75"/>
    <circle  cx="452" cy="560" r="7"  fill="white" opacity="0.38"/>
    <ellipse cx="512" cy="597" rx="85" ry="26" fill="none" stroke="white" stroke-width="4.7" opacity="0.16"/>
    <path    d="M427,546 Q512,580 597,546" fill="none" stroke="white" stroke-width="3.8" opacity="0.12"/>
    <path    d="M418,640 Q512,666 607,640" fill="none" stroke="white" stroke-width="3.0" opacity="0.09"/>
    <ellipse cx="512" cy="704" rx="93" ry="23" fill="#008840" opacity="0.18"/>

    <!-- 速度线 -->
    <line x1="618" y1="546" x2="686" y2="512" stroke="#AAFF44" stroke-width="7.7" stroke-linecap="round" opacity="0.55"/>
    <line x1="624" y1="588" x2="701" y2="580" stroke="#AAFF44" stroke-width="6.0" stroke-linecap="round" opacity="0.40"/>
    <line x1="615" y1="631" x2="682" y2="648" stroke="#AAFF44" stroke-width="5.1" stroke-linecap="round" opacity="0.30"/>

    <!-- ECG波形 -->
    <polyline
      points="68,751 120,751 148,699 176,803 205,665 233,751 277,751 320,751 349,724 378,751 422,751 465,751 494,707 524,751 554,751 597,751 626,724 656,751 700,751 729,699 757,803 786,665 814,751 858,751 900,751 930,724 960,751 982,751"
      fill="none" stroke="url(#ecg)"
      stroke-width="10.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.90"/>
    <circle cx="205" cy="665" r="17" fill="#00FF88" opacity="0.92"/>
    <circle cx="786" cy="665" r="17" fill="#AAFF44" opacity="0.92"/>
    <circle cx="494" cy="707" r="11" fill="#00FFCC" opacity="0.72"/>

    <!-- 文字 -->
    <rect x="58" y="819" width="908" height="154" rx="43" fill="#020804" opacity="0.75"/>
    <text x="512" y="917"
          text-anchor="middle"
          font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
          font-size="94" font-weight="700" fill="#44FF88"
          letter-spacing="8.5">Smart Sensor Ball</text>
  </g>
</svg>
